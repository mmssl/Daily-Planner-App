<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }} - Görev Takip</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #007fff;
    --accent-dark: #0060cc;
    --accent-light: #339dff;
    --bg: #f0f4f8;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #1a2332;
    --text2: #64748b;
    --text3: #94a3b8;
    --red: #e74c3c;
    --green: #27ae60;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, var(--accent-dark) 0%, var(--accent) 50%, var(--accent-light) 100%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .auth-card {
    background: var(--surface);
    border-radius: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,.15);
    padding: 40px;
    width: 100%;
    max-width: 420px;
    animation: slideIn .35s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .auth-logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .auth-logo .icon {
    font-size: 48px;
    margin-bottom: 6px;
  }
  .auth-logo h1 {
    font-size: 24px;
    color: var(--text);
    font-weight: 700;
  }
  .auth-logo p {
    color: var(--text2);
    font-size: 13px;
    margin-top: 6px;
  }

  form { display: flex; flex-direction: column; gap: 16px; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 12px;
    color: var(--text2);
    font-weight: 600;
  }
  .field input {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus { border-color: var(--accent); }

  .btn-primary {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background .2s;
    margin-top: 6px;
  }
  .btn-primary:hover { background: var(--accent-dark); }

  .alert {
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 4px;
  }
  .alert.error {
    background: rgba(231,76,60,.1);
    color: var(--red);
    border: 1px solid rgba(231,76,60,.2);
  }
  .alert.success {
    background: rgba(39,174,96,.1);
    color: var(--green);
    border: 1px solid rgba(39,174,96,.2);
  }
  .alert.info {
    background: rgba(0,127,255,.1);
    color: var(--accent);
    border: 1px solid rgba(0,127,255,.2);
  }

  .auth-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: var(--text2);
  }
  .auth-footer a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }
  .auth-footer a:hover { text-decoration: underline; }

  .auth-link-row {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
    font-size: 12px;
  }
  .auth-link-row a {
    color: var(--accent);
    text-decoration: none;
  }
  .auth-link-row a:hover { text-decoration: underline; }

  .reset-link-box {
    background: rgba(0,127,255,.08);
    border: 1.5px solid var(--accent);
    border-radius: 10px;
    padding: 14px;
    margin: 16px 0;
    word-break: break-all;
    font-family: monospace;
    font-size: 12px;
    color: var(--accent);
  }
  .reset-link-box .label {
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .copy-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    font-family: 'DM Sans', sans-serif;
  }
  .copy-btn:hover { background: var(--accent-dark); }
</style>
</head>
<body>
  <div class="auth-card">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
